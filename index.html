<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>斯特魯普實驗 (Stroop Test)</title>
  <!-- 載入 jsPsych 核心程式庫 (v8.2.3) -->
  <script src="https://unpkg.com/jspsych@8.2.3"></script>
  <!-- 載入所需插件 -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.0.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-fullscreen@2.0.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@2.0.0"></script>
  <!-- 載入 jsPsych 預設樣式表 -->
  <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />
  
  <style>
    /* 設定刺激物的 CSS 樣式 */
    body {
      background-color: #f5f5f5; /* 設定背景色為微灰，讓黃色字體更清楚且不刺眼 */
    }
    .stroop-text {
      font-size: 120px;
      font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
      font-weight: bold;
    }
    .instructions-text {
      font-size: 24px;
      line-height: 1.6;
      font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
    }
    .key-box {
      display: inline-block;
      border: 2px solid #555;
      padding: 2px 12px;
      margin: 0 5px;
      border-radius: 6px;
      background-color: #fff;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body></body>
<script>
  // 初始化 jsPsych
  const jsPsych = initJsPsych({
    on_finish: function() {
      // 獲取受試者編號
      let subject_id = 'unknown';
      try {
        const id_values = jsPsych.data.get().select('subject_id').values;
        // 找到第一個非 undefined/null 的 subject_id
        for(let val of id_values) {
          if (val) {
            subject_id = val;
            break;
          }
        }
      } catch(e) {
        console.error("無法取得受試者編號", e);
      }
      
      // 將數據輸出為 CSV 檔案並自群下載
      jsPsych.data.get().localSave('csv', `stroop_data_${subject_id}.csv`);
      // 此行會在畫面上顯示數據，以供後續檢視
      jsPsych.data.displayData('csv');
    }
  });

  // 創建專案的時間軸 (timeline)
  const timeline = [];

  // --- 1. 全螢幕模式 ---
  const enter_fullscreen = {
    type: jsPsychFullscreen,
    message: '<p class="instructions-text">實驗即將開始，為了不受干擾，請點擊下方按鈕進入全螢幕模式。</p>',
    button_label: '進入全螢幕',
    fullscreen_mode: true
  };
  timeline.push(enter_fullscreen);

  // --- 2. 輸入受試者編號 ---
  const enter_id = {
    type: jsPsychSurveyText,
    questions: [
      {prompt: '<p class="instructions-text">請輸入您的受試者編號：</p>', name: 'subject_id', required: true}
    ],
    button_label: '繼續',
    on_finish: function(data){
      // 將受試者編號加入後續的所有 data 中
      jsPsych.data.addProperties({
        subject_id: data.response.subject_id
      });
    }
  };
  timeline.push(enter_id);

  // --- 3. 第一階段：實驗指導語 ---
  const instructions_phase1 = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <h2>第一階段：依「字體顏色」做反應</h2>
      <div class="instructions-text" style="text-align: left; max-width: 650px; margin: 0 auto;">
        <p>在這個階段，螢幕中央會出現中文字：<strong>紅、綠、藍、黃</strong>。</p>
        <p>您的任務是判斷中文字的<strong>「字體顏色」</strong>，<span style="color:red;">請忽略文字本身的意義</span>。</p>
        <p>請根據<strong>字體顏色</strong>，盡快且準確地按下對應的鍵盤按鍵：</p>
        <ul>
          <li>字體顏色是 <span style="color: red; font-weight: bold;">紅色</span> &rarr; 請按 <span class="key-box">1</span> 鍵</li>
          <li>字體顏色是 <span style="color: green; font-weight: bold;">綠色</span> &rarr; 請按 <span class="key-box">2</span> 鍵</li>
          <li>字體顏色是 <span style="color: blue; font-weight: bold;">藍色</span> &rarr; 請按 <span class="key-box">3</span> 鍵</li>
          <li>字體顏色是 <span style="color: #d4a017; font-weight: bold;">黃色</span> &rarr; 請按 <span class="key-box">4</span> 鍵</li>
        </ul>
        <p style="text-align: center; margin-top: 30px;">如果您準備好了，請將手指放在數字鍵 1, 2, 3, 4 上。<br>按下 <strong>空白鍵 (Space)</strong> 開始第一階段實驗。</p>
      </div>
    `,
    choices: [' ']
  };
  timeline.push(instructions_phase1);

  // --- 4. 定義刺激材料 ---
  const words = ['紅', '綠', '藍', '黃'];
  const colorMapping = {
    '紅': { code: 'red', key: '1' },
    '綠': { code: 'green', key: '2' },
    '藍': { code: 'blue', key: '3' },
    '黃': { code: '#d4a017', key: '4' } 
  };

  // 第一階段刺激（字體顏色）
  let stroop_stimuli_phase1 = [];
  for (let w of words) {
    for (let c of words) {
      stroop_stimuli_phase1.push({
        word: w,
        color_code: colorMapping[c].code,
        color_name: c,
        condition: (w === c) ? '一致 (congruent)' : '不一致 (incongruent)',
        correct_response: colorMapping[c].key // 依據字體顏色(c)反應
      });
    }
  }

  // 第二階段刺激（文字字義）
  let stroop_stimuli_phase2 = [];
  for (let w of words) {
    for (let c of words) {
      stroop_stimuli_phase2.push({
        word: w,
        color_code: colorMapping[c].code,
        color_name: c,
        condition: (w === c) ? '一致 (congruent)' : '不一致 (incongruent)',
        correct_response: colorMapping[w].key // 依據文字字義(w)反應
      });
    }
  }

  // --- 5. 注視點 (Fixation Cross) ---
  const fixation = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div style="font-size: 60px;">+</div>',
    choices: "NO_KEYS",
    trial_duration: function() {
      // 隨機呈現注視點 500ms 到 1000ms
      return jsPsych.randomization.sampleWithoutReplacement([500, 750, 1000], 1)[0];
    },
    data: {
      task: 'fixation'
    }
  };

  // --- 6. 第一階段：實驗試次 (Trial) ---
  const phase1_trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      const word = jsPsych.evaluateTimelineVariable('word');
      const color = jsPsych.evaluateTimelineVariable('color_code');
      return `<div class="stroop-text" style="color: ${color};">${word}</div>`;
    },
    choices: ['1', '2', '3', '4'], 
    trial_duration: 3000, 
    data: {
      phase: 1, // 標記為第一階段
      task: 'response',
      word_meaning: jsPsych.timelineVariable('word'),
      font_color: jsPsych.timelineVariable('color_name'),
      condition: jsPsych.timelineVariable('condition'),
      correct_response: jsPsych.timelineVariable('correct_response')
    },
    on_finish: function(data) {
      if (data.response === null) {
        data.correct = false; // 逾時
      } else {
        data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
      }
    }
  };

  const phase1_procedure = {
    timeline: [fixation, phase1_trial],
    timeline_variables: stroop_stimuli_phase1,
    randomize_order: true, 
    repetitions: 2 // 每個組合重複 2 次，共 32 回合 (16 x 2)
  };
  timeline.push(phase1_procedure);

  // --- 7. 第二階段：實驗指導語 ---
  const instructions_phase2 = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <h2>第二階段：依「文字字義」做反應</h2>
      <div class="instructions-text" style="text-align: left; max-width: 650px; margin: 0 auto;">
        <p>現在規則改變了！</p>
        <p>您的任務是判斷中央中文字的<strong>「文字字義」</strong>，<span style="color:red;">請忽略字體顏色</span>。</p>
        <p>請根據<strong>文字字義</strong>，盡快且準確地按下對應的鍵盤按鍵：</p>
        <ul>
          <li>文字字義是「紅」 &rarr; 請按 <span class="key-box">1</span> 鍵</li>
          <li>文字字義是「綠」 &rarr; 請按 <span class="key-box">2</span> 鍵</li>
          <li>文字字義是「藍」 &rarr; 請按 <span class="key-box">3</span> 鍵</li>
          <li>文字字義是「黃」 &rarr; 請按 <span class="key-box">4</span> 鍵</li>
        </ul>
        <p style="text-align: center; margin-top: 30px;">如果您準備好了，請按下 <strong>空白鍵 (Space)</strong> 開始第二階段實驗。</p>
      </div>
    `,
    choices: [' ']
  };
  timeline.push(instructions_phase2);

  // --- 8. 第二階段：實驗試次 (Trial) ---
  const phase2_trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      const word = jsPsych.evaluateTimelineVariable('word');
      const color = jsPsych.evaluateTimelineVariable('color_code');
      return `<div class="stroop-text" style="color: ${color};">${word}</div>`;
    },
    choices: ['1', '2', '3', '4'], 
    trial_duration: 3000, 
    data: {
      phase: 2, // 標記為第二階段
      task: 'response',
      word_meaning: jsPsych.timelineVariable('word'),
      font_color: jsPsych.timelineVariable('color_name'),
      condition: jsPsych.timelineVariable('condition'),
      correct_response: jsPsych.timelineVariable('correct_response')
    },
    on_finish: function(data) {
      if (data.response === null) {
        data.correct = false; // 逾時
      } else {
        data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
      }
    }
  };

  const phase2_procedure = {
    timeline: [fixation, phase2_trial],
    timeline_variables: stroop_stimuli_phase2,
    randomize_order: true, 
    repetitions: 2 // 每個組合重複 2 次，共 32 回合 (16 x 2)
  };
  timeline.push(phase2_procedure);

  // --- 9. 實驗結束語 ---
  const debrief = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <h2>實驗結束</h2>
      <div class="instructions-text">
        <p>非常感謝您的參與！</p>
        <p>請按<strong>任意鍵</strong>離開全螢幕，實驗數據將會自動下載為 CSV 檔。</p>
      </div>
    `
  };
  timeline.push(debrief);

  // 退出全螢幕
  const exit_fullscreen = {
    type: jsPsychFullscreen,
    fullscreen_mode: false,
    delay_after: 0
  };
  timeline.push(exit_fullscreen);

  // 開始執行實驗時間軸
  jsPsych.run(timeline);

</script>
</html>
